kind = "web"
previewPath = "/"
title = "Tracked"
version = "1.0.0"
id = "artifacts/tracked"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23278

[services.development]
run = "pnpm --filter @workspace/tracked run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tracked", "run", "build" ]
publicDir = "artifacts/tracked/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23278"
BASE_PATH = "/"
